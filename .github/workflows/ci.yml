name: Open-COBOL-ESQL CI

on:
  push:
    branches:
      - develop
      - main
      - master
  pull_request:
    branches:
      - develop
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show system info
        run: |
          uname -a
          lsb_release -a || true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            make \
            gcc \
            g++ \
            git \
            libpq-dev \
            postgresql-client \
            gnucobol

      - name: Check installed tools
        run: |
          cobc -V || true
          pg_config --version || true
          autoreconf --version || true

      - name: Configure
        run: |
          export CPPFLAGS="-I/usr/include/postgresql"
          ./configure

      - name: Build
        run: |
          make -j"$(nproc)"

      - name: Install
        run: |
          sudo make install
          sudo ldconfig

      - name: Smoke test - check binary and library
        run: |
          which ocesql || true
          ocesql --help || true
          ls -l /usr/local/lib | grep ocesql || true
          ldconfig -p | grep ocesql || true

      - name: Upload logs if needed
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            config.log
          if-no-files-found: ignore