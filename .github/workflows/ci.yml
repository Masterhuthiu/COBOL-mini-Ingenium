name: Open-COBOL-ESQL CI

on:
  push:
    branches:
      - develop
      - main
      - master
  pull_request:
    branches:
      - develop
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f | sort | head -200

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            make \
            gcc \
            g++ \
            git \
            m4 \
            libpq-dev \
            postgresql-client \
            gnucobol

      - name: Generate configure script
        run: |
          if [ -f "./autogen.sh" ]; then
            chmod +x ./autogen.sh
            ./autogen.sh
          else
            autoreconf -fi
          fi

      - name: Configure
        run: |
          export CPPFLAGS="-I/usr/include/postgresql"
          ./configure

      - name: Build
        run: |
          make -j"$(nproc)"

      - name: Install
        run: |
          sudo make install
          sudo ldconfig

      - name: Smoke test
        run: |
          which ocesql || true
          ocesql --help || true
          ls -l /usr/local/lib | grep ocesql || true
          ldconfig -p | grep ocesql || true

      - name: Upload config logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            config.log
            config.status
          if-no-files-found: ignore