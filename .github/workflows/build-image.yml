name: Build & Push Docker Image

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/cobol-esql

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-esql:
    runs-on: ubuntu-latest
    needs: build-and-push

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gnucobol libpq-dev postgresql-client \
            build-essential gcc g++ make \
            autoconf automake libtool \
            bison flex pkg-config git

      - name: Build and install ocesql
        run: |
          git clone --depth 1 --branch develop \
            https://github.com/opensourcecobol/Open-COBOL-ESQL.git /tmp/ocesql
          cd /tmp/ocesql
          chmod +x autogen.sh && ./autogen.sh
          export YACC="bison -y"
          export CPPFLAGS="-I/usr/include/postgresql"
          ./configure
          make
          sudo make install
          echo "/usr/local/lib" | sudo tee /etc/ld.so.conf.d/ocesql.conf
          sudo ldconfig
          ldconfig -p | grep ocesql

      - name: Pre-compile COBOL ESQL samples
        run: |
          export COBCPY=/usr/local/share/open-cobol-esql/copy
          cd /tmp/ocesql/sample
          ocesql INSERTTBL.cbl INSERTTBL.cob