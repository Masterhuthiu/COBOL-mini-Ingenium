name: Build & Push Docker Image

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/cobol-esql

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # JOB TEST: chạy ESQL sample của repo gốc
  # ============================================
  test-esql:
    runs-on: ubuntu-latest
    needs: build-and-push

    # Spin up PostgreSQL thật
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cài đúng packages như Dockerfile
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gnucobol libpq-dev postgresql-client \
            build-essential gcc g++ make \
            autoconf automake libtool \
            bison flex pkg-config git

      # Build & install ocesql từ repo gốc
      - name: Build and install ocesql
        run: |
          git clone --depth 1 --branch develop \
            https://github.com/opensourcecobol/Open-COBOL-ESQL.git /tmp/ocesql
          cd /tmp/ocesql
          chmod +x autogen.sh && ./autogen.sh
          export YACC="bison -y"
          export CPPFLAGS="-I/usr/include/postgresql"
          ./configure
          make
          sudo make install
          sudo ldconfig

      # Pre-compile file ESQL mẫu của repo gốc
      - name: Pre-compile COBOL ESQL samples
        run: |
          export COBCPY=/usr/local/share/ocesql/copy
          cd /tmp/ocesql/sample

          # ocesql chuyển .cbl → .cob
          ocesql INSERTTBL.cbl INSERTTBL.cob
          ocesql FETCHTBL.cbl FETCHTBL.cob

          echo "✅ Pre-compile thành công"

      # Compile COBOL → executable
      - name: Compile COBOL programs
        run: |
          export COBCPY=/usr/local/share/ocesql/copy
          cd /tmp/ocesql/sample

          cobc -x -locesql INSERTTBL.cob -o INSERTTBL
          cobc -x -locesql FETCHTBL.cob -o FETCHTBL

          echo "✅ Compile thành công"
          ls -la INSERTTBL FETCHTBL

      # Chạy program thật với PostgreSQL
      - name: Run INSERTTBL (tạo bảng + insert data)
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: testdb
        run: |
          cd /tmp/ocesql/sample
          ./INSERTTBL
          echo "✅ INSERTTBL chạy thành công"

      - name: Run FETCHTBL (fetch data từ DB)
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: testdb
        run: |
          cd /tmp/ocesql/sample
          ./FETCHTBL
          echo "✅ FETCHTBL chạy thành công"

      # Verify data trong PostgreSQL
      - name: Verify data in PostgreSQL
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d testdb \
            -c "SELECT * FROM TESTTBL LIMIT 10;"