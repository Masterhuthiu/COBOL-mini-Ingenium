name: Build & Push Docker Image

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/cobol-esql

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-esql:
    runs-on: ubuntu-latest
    needs: build-and-push

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gnucobol libpq-dev postgresql-client \
            build-essential gcc g++ make \
            autoconf automake libtool \
            bison flex pkg-config git

      - name: Build and install ocesql
        run: |
          git clone --depth 1 --branch develop \
            https://github.com/opensourcecobol/Open-COBOL-ESQL.git /tmp/ocesql
          cd /tmp/ocesql
          chmod +x autogen.sh && ./autogen.sh
          export YACC="bison -y"
          export CPPFLAGS="-I/usr/include/postgresql"
          ./configure
          make
          sudo make install
          echo "/usr/local/lib" | sudo tee /etc/ld.so.conf.d/ocesql.conf
          sudo ldconfig
          echo "--- Kiểm tra library ---"
          ls -la /usr/local/lib/libocesql*

      - name: Debug - xem GnuCOBOL tìm module ở đâu
        run: |
          echo "--- cobcrun info ---"
          cobcrun --info
          echo "--- nm libocesql: xem symbol OCESQLConnect ---"
          nm -D /usr/local/lib/libocesql.so | grep -i ocesql | head -20
          echo "--- file type ---"
          file /usr/local/lib/libocesql.so

      - name: Pre-compile COBOL ESQL samples
        run: |
          export COBCPY=/usr/local/share/open-cobol-esql/copy
          cd /tmp/ocesql/sample
          ocesql INSERTTBL.cbl INSERTTBL.cob
          ocesql FETCHTBL.cbl FETCHTBL.cob
          echo "✅ Pre-compile thành công"

      - name: Compile COBOL programs
        run: |
          export COBCPY=/usr/local/share/open-cobol-esql/copy
          cd /tmp/ocesql/sample
          cp /usr/local/lib/libocesql.so ./OCESQLConnect.so
          cp /usr/local/lib/libocesql.so ./OCESQL.so
          cobc -x INSERTTBL.cob /usr/local/lib/libocesql.so -o INSERTTBL
          cobc -x FETCHTBL.cob  /usr/local/lib/libocesql.so -o FETCHTBL
          echo "✅ Compile thành công"
          ls -la

      - name: Run INSERTTBL và in kết quả
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: testdb
        run: |
          export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
          export COB_LIBRARY_PATH=/tmp/ocesql/sample:/usr/local/lib
          cd /tmp/ocesql/sample
          echo "========================================"
          echo "  CHẠY INSERTTBL - Tạo bảng + Insert"
          echo "========================================"
          ./INSERTTBL
          echo "✅ INSERTTBL hoàn thành"

      - name: Run FETCHTBL và in kết quả
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: testdb
        run: |
          export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
          export COB_LIBRARY_PATH=/tmp/ocesql/sample:/usr/local/lib
          cd /tmp/ocesql/sample
          echo "========================================"
          echo "  CHẠY FETCHTBL - Đọc data từ DB"
          echo "========================================"
          ./FETCHTBL
          echo "✅ FETCHTBL hoàn thành"

      - name: 🔍 Verify - Xem data trong PostgreSQL
        run: |
          echo "========================================"
          echo "  DATA TRONG BẢNG TESTTBL"
          echo "========================================"
          PGPASSWORD=postgres psql -h localhost -U postgres -d testdb \
            -c "\dt"
          echo "--- Nội dung bảng ---"
          PGPASSWORD=postgres psql -h localhost -U postgres -d testdb \
            -c "SELECT * FROM TESTTBL;"
          echo "--- Số dòng ---"
          PGPASSWORD=postgres psql -h localhost -U postgres -d testdb \
            -c "SELECT COUNT(*) as tong_so_dong FROM TESTTBL;"
          echo "========================================"