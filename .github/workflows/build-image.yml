name: Build & Push Docker Image

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  # Cập nhật để hỗ trợ Node 24 theo yêu cầu của GitHub
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mini-ingenium-dotnet

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 7 (for Otterkit)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Install Otterkit
        run: |
          dotnet tool install --global Otterkit
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Build COBOL DbTest
        run: |
          # 1. Khắc phục lỗi DirectoryNotFound: Tạo thủ công các thư mục tạm
          mkdir -p .otterkit/OtterkitExport
          mkdir -p cobol/bin
          
          # 2. Thực hiện Build
          # Lưu ý: --entry phải trỏ đúng file vật lý có chứa PROGRAM-ID
          otterkit build cobol/DbTest.cbl \
            --entry cobol/DbTest.cbl \
            -r src/Services/DbConnector.dll \
            -o cobol/bin
          
          echo "COBOL build finished"

      - name: Verify COBOL Build Output
        run: |
          if [ -f "cobol/bin/DbTest.dll" ]; then
            echo "DbTest.dll generated successfully."
          else
            echo "Error: DbTest.dll not found!" && exit 1
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-ingenium:
    runs-on: ubuntu-latest
    needs: build-and-push

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ingenium
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 (for ASP.NET Core API)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build API
        run: |
          dotnet restore src/MiniIngenium.csproj
          dotnet build src/MiniIngenium.csproj -c Release --no-restore

      - name: Database Migration & API Start
        env:
          PGHOST: localhost
          PGDATABASE: ingenium
          PGUSER: postgres
          PGPASSWORD: postgres
          ASPNETCORE_URLS: http://+:5000
        run: |
          # Nạp schema
          psql -h localhost -U postgres -d ingenium -f db/schema.sql
          
          # Chạy API trong background
          dotnet run --project src/MiniIngenium.csproj --no-build -c Release &
          
          # Đợi API sẵn sàng
          echo "Waiting for health check..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/policy/query?id=1 > /dev/null 2>&1; then
              echo "API is UP"
              break
            fi
            sleep 1
          done

      - name: Integration Testing
        run: |
          # Test các endpoint chính
          curl -sf "http://localhost:5000/policy/query?id=1" | python3 -m json.tool
          curl -sf -X POST http://localhost:5000/policy/rating -H "Content-Type: application/json" -d '{"policyId": 1}' | python3 -m json.tool