name: Mini-Ingenium Enterprise Build

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ingenium
        ports: ["5432:5432"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gnucobol libcob4-dev libpq-dev postgresql-client autoconf automake libtool-bin make gcc git

      - name: Install Open-COBOL-ESQL (ocesql)
        run: |
          git clone --depth 1 https://github.com/opensourcecobol/Open-COBOL-ESQL.git
          cd Open-COBOL-ESQL
          ./autogen.sh
          ./configure --with-postgresql
          make
          sudo make install
          sudo ldconfig

      - name: Build Application
        run: |
          mkdir -p bin
          
          # Đảm bảo file không bị lỗi dòng cuối (newline)
          sed -i '$a\' src/PolicyClass.cbl
          sed -i '$a\' src/MainApp.cbl
          
          # 1. Pre-compile SQL: Chuyển EXEC SQL thành mã COBOL gọi API
          ocesql src/PolicyClass.cbl src/PolicyClass.cob

          # 2. Tìm thư mục chứa SQLCA.cbl (thường là /usr/local/share/ocesql/copy)
          # Đây là bước cực kỳ quan trọng để sửa lỗi "SQLCA: No such file"
          OCESQL_COPY=$(find /usr/local/share -name "SQLCA.cbl" -exec dirname {} \; | head -n 1)
          
          # 3. Biên dịch kết hợp
          # -I: Include đường dẫn copybook
          # -L, -l: Link tới thư viện ocesql và postgres
          cobc -x -free src/MainApp.cbl src/PolicyClass.cob \
               -I "$OCESQL_COPY" \
               -L/usr/local/lib -locesql -lpq \
               -o bin/ingenium_app

      - name: Integration Test
        env:
          PGPASSWORD: postgres
          LD_LIBRARY_PATH: /usr/local/lib
        run: |
          # Khởi tạo DB
          psql -h localhost -U postgres -d ingenium -c "CREATE TABLE IF NOT EXISTS policy (policy_id BIGINT PRIMARY KEY, status VARCHAR(10));"
          # Chạy ứng dụng
          ./bin/ingenium_app