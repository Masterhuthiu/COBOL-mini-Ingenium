name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # Bước quan trọng: Khởi tạo Buildx để hỗ trợ Cache và các driver hiện đại
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Prepare Image Name
        id: prep
        run: |
          # Chuyển tên user về chữ thường để Docker không báo lỗi "invalid reference format"
          LOW_USER=$(echo "${{ secrets.DOCKER_USER }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="$LOW_USER/mini-ingenium"
          echo "IMAGE_TAG=$IMAGE_NAME:latest" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_TAG }}
          # Sử dụng Cache của GitHub Actions để build nhanh hơn ở các lần sau
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Build successful!"
          echo "Image pushed to: ${{ env.IMAGE_TAG }}"