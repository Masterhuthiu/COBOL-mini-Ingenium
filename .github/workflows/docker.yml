name: Build COBOL ESQL Application

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t cobol-esql-app .

      - name: Compile COBOL SQL
        run: |
          # Giả sử bạn có file main.scb
          docker run --rm -v ${{ github.workspace }}:/app cobol-esql-app \
          bash -c "esqloc -o main.cbl main.scb && cobc -x -o main main.cbl -locsql"