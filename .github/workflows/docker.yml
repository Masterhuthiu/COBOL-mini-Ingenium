name: Build Docker

on:
  push:
    branches: [main]

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: mini-ingenium

    steps:

    - uses: actions/checkout@v4

    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASS }}

    - name: Build image
      run: |
        IMAGE=${{ secrets.DOCKER_USER }}/$IMAGE_NAME:latest
        echo "Building $IMAGE"
        docker build -t $IMAGE .

    - name: Push image
      run: |
        IMAGE=${{ secrets.DOCKER_USER }}/$IMAGE_NAME:latest
        docker push $IMAGE